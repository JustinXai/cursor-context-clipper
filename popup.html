<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Context Clipper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #000;
      color: #fff;
      width: 320px;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      opacity: 0.8;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.08);
      color: #888;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #aaa;
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
      word-break: break-word;
    }

    .status.success {
      display: block;
      background: rgba(255, 255, 255, 0.1);
      color: #4ade80;
    }

    .status.error {
      display: block;
      background: rgba(255, 255, 255, 0.1);
      color: #f87171;
    }

    .status.loading {
      display: block;
      background: rgba(255, 255, 255, 0.1);
      color: #888;
    }

    .status-hint {
      margin-top: 4px;
      font-size: 11px;
      color: #555;
      text-align: center;
      display: none;
    }

    .status-hint.visible {
      display: block;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .refresh-btn {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .refresh-btn.visible {
      display: block;
    }

    .refresh-btn:hover {
      background: rgba(59, 130, 246, 0.25);
    }

    .fallback-btn {
      display: none;
      padding: 8px 12px;
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    .fallback-btn.visible {
      display: block;
    }

    .fallback-btn:hover {
      background: rgba(251, 191, 36, 0.25);
    }

    .stats {
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      display: none;
    }

    .stats.visible {
      display: block;
    }

    .stats-title {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .stat-label {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .stat-item.token .stat-value {
      color: #8b5cf6;
      font-weight: 700;
      cursor: help;
      transition: color 0.2s ease;
    }

    .stat-item.token .stat-value:hover {
      color: #a78bfa;
    }

    .pro-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-pro {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-pro::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-pro:hover::before {
      left: 100%;
    }

    .btn-pro:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-pro:active {
      transform: translateY(0);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: calc(100% - 32px);
      max-width: 288px;
      text-align: center;
      animation: modalSlideIn 0.3s ease;
      position: relative;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-text {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .modal-highlight {
      color: #a78bfa;
      font-weight: 500;
    }

    .modal-btn {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .modal-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .modal-close:hover {
      color: #fff;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: #555;
    }

    .shortcut-hint {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #444;
    }

    .shortcut-hint kbd {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cursor Context Clipper</h1>
    <p>Webpage to Markdown</p>
  </div>

  <div class="btn-group">
    <button id="extractBtn" class="btn-primary">Copy for LLM</button>
    <button id="claudeBtn" class="btn-secondary">Copy for Claude</button>
  </div>

  <div id="status" class="status"></div>
  <div id="statusHint" class="status-hint"></div>

  <div class="action-buttons">
    <button id="refreshBtn" class="refresh-btn">Refresh Page to Reconnect</button>
    <button id="fallbackBtn" class="fallback-btn">Extract Plain Text (Fallback)</button>
  </div>

  <div id="stats" class="stats">
    <div class="stats-title">Stats</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div id="charCount" class="stat-value">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat-item token">
        <div id="tokenCount" class="stat-value" title="Based on ~4 chars/token, helps you manage context window.">0</div>
        <div class="stat-label">Tokens Est.</div>
      </div>
    </div>
  </div>

  <div class="pro-section">
    <button id="btnPro" class="btn-pro">Batch Clip All Tabs (Pro)</button>
  </div>

  <div class="shortcut-hint">
    Hotkeys: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>C</kbd>
  </div>

  <div class="footer">Markdown for Cursor AI</div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <button id="modalClose" class="modal-close">×</button>
      <div class="modal-icon">🚀</div>
      <div class="modal-title">Batch Export Coming Soon!</div>
      <div class="modal-text">
        Turn all your open tabs into a single knowledge base for Cursor AI.<br><br>
        <span class="modal-highlight">Join the Waitlist & Get 50% Early Bird Discount!</span>
      </div>
      <button id="modalBtn" class="modal-btn">Join Waitlist →</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
